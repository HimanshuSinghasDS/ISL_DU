experiment_name: exp3_resnet18_kan_finetune
model_name: resnet18_kan
data_dir: data/isl
output_dir: results
num_classes: 26
image_size: 224
batch_size: 32
num_workers: 4
epochs: 30
seed: 42
pretrained: true
freeze_backbone: true
fine_tune_last_block: true
backbone_lr: 0.00005
head_lr: 0.001
weight_decay: 0.0001
label_smoothing: 0.0
scheduler: cosine
early_stopping_patience: 8
kan_hidden_dims: [256]
use_class_weights: false
save_confusion_matrix: true
